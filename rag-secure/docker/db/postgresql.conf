# ============================================================================
# postgresql.conf — rag-db (S2, S4, S5 — SPEC §3.1)
# ----------------------------------------------------------------------------
# Fichier minimal : tout paramètre absent prend sa valeur par défaut compilée.
# Chargé via `postgres -c config_file=...` (command du service compose).
# ============================================================================

# --- Réseau -----------------------------------------------------------------
# Le conteneur doit être joignable par rag-app sur le réseau interne rag-net.
# L'isolation vient du réseau docker `internal: true` (S1) + pg_hba.conf,
# PAS de listen_addresses : aucune publication de port sur l'hôte.
listen_addresses = '*'
port = 5432
max_connections = 50

# --- Authentification (S2) ----------------------------------------------------
password_encryption = scram-sha-256

# --- Audit (S4) ----------------------------------------------------------------
# pgaudit chargé au démarrage (obligatoire pour l'extension).
shared_preload_libraries = 'pgaudit'
# Écritures + DDL tracés globalement ; les lectures de rag_reader sont
# ajoutées par rôle dans initdb/04_audit.sql.
pgaudit.log = 'write, ddl'
# CRITIQUE (invariant 5) : ne JAMAIS journaliser les paramètres liés —
# la clé pgcrypto passe en paramètre et ne doit apparaître dans aucun log.
pgaudit.log_parameter = off
# Ne pas tracer le bruit des requêtes catalogue.
pgaudit.log_catalog = off

# --- Journalisation des connexions (S4, ES4) ---------------------------------
log_connections = on
log_disconnections = on
# stderr → capturé par `docker logs rag-db` (pas de collector fichier interne)
logging_collector = off
log_line_prefix = '%m [%p] %u@%d '

# --- Divers -------------------------------------------------------------------
# Volumétrie modeste (~2 500 chunks, NOTES §4) : défauts suffisants.
shared_buffers = 256MB
timezone = 'UTC'
