# ============================================================================
# pg_hba.conf — rag-db (S2 — SPEC §3.1, NOTES §5)
# ----------------------------------------------------------------------------
# Règle : scram-sha-256 partout, AUCUN `trust`. Toute ligne non couverte
# ci-dessous est implicitement rejetée par PostgreSQL.
#
# NB : pendant l'initdb (premier démarrage), l'entrypoint de l'image utilise
# un serveur temporaire local avec le pg_hba généré par initdb — ce fichier
# ne s'applique qu'au serveur définitif (command -c hba_file=...).
# ============================================================================

# TYPE  DATABASE  USER                                          ADDRESS       METHOD

# Maintenance locale dans le conteneur (docker exec rag-db psql ...)
local   all       all                                                         scram-sha-256
host    all       all                                           127.0.0.1/32  scram-sha-256
host    all       all                                           ::1/128       scram-sha-256

# Rôles applicatifs depuis le sous-réseau docker rag-net uniquement.
# `samenet` = tout sous-réseau directement attaché aux interfaces du serveur
# (le sous-réseau rag-net, sans en coder l'adresse en dur).
host    ragdb     rag_admin,rag_ingest,rag_reader,rag_auditor   samenet       scram-sha-256
